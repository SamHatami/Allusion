name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Allusion.sln

      - name: Test
        run: dotnet test Allusion.Tests/Allusion.Tests.csproj --configuration Release --no-restore

      - name: Publish single executable
        run: >
          dotnet publish Allusion/Allusion.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          --output publish/win-x64

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Allusion-win-x64
          path: publish/win-x64/Allusion.exe
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/win-x64/Allusion.exe
